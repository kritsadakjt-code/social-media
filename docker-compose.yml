version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: social_mongodb
    ports: ['27018:27017']
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:7.0-alpine
    container_name: social_redis
    ports: ['6379:6379']
    volumes:
      - redis_data:/data

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
    container_name: social_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports: ['9200:9200']
    volumes:
      - es_data:/usr/share/elasticsearch/data

  rabbitmq:
    image: rabbitmq:3.11-management-alpine
    container_name: social_rabbitmq
    ports:
      - '5672:5672' # พอร์ตสำหรับ Microservices เชื่อมต่อ (AMQP)
      - '15672:15672' # พอร์ตสำหรับหน้า Dashboard (Management UI)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

volumes:
  mongodb_data:
  redis_data:
  es_data:
  rabbitmq_data:
